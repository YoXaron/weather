<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Weather Viewer – Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/static/style.css}">
    <link rel="icon" type="image/png" th:href="@{/static/weather-app.png}">
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-6">
            <div class="weather-logo"></div>
        </div>
    </div>

    <h2 class="text-center mb-5">Sign Up</h2>

    <div class="row justify-content-center" th:if="${errorMessage}">
        <div class="col-12 col-lg-4 col-md-6 col-sm-12">
            <div class="alert alert-danger" role="alert" th:text="${errorMessage}">
                Something went wrong during registration.
            </div>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-12 col-lg-4 col-md-6 col-sm-12">

            <form th:action="@{/auth/signup}" method="post" th:object="${signUpRequest}">

                <div class="mb-3">
                    <label for="login" class="form-label">Username</label>
                    <input type="text"
                           class="form-control"
                           id="login"
                           name="login"
                           th:field="*{login}"
                           th:classappend="${#fields.hasErrors('login')} ? 'is-invalid' : ''"
                           required/>

                    <div class="invalid-feedback" th:if="${#fields.hasErrors('login')}" th:errors="*{login}">
                        Invalid username
                    </div>
                </div>


                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password"
                           class="form-control"
                           id="password"
                           name="password"
                           th:field="*{password}"
                           th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''"
                           onkeyup="checkPasswordMatch()"
                           required/>

                    <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">
                        Invalid password
                    </div>
                </div>


                <div class="mb-3">
                    <label for="repeatPassword" class="form-label">Repeat password</label>
                    <input type="password"
                           class="form-control"
                           id="repeatPassword"
                           name="repeatPassword"
                           onkeyup="checkPasswordMatch()"
                           required/>

                    <div id="passwordMismatch" class="text-danger mt-1" style="display: none;">
                        Passwords do not match
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="btn btn-primary w-100 mt-3">Sign Up</button>

                <p class="mt-2 text-center">
                    Already have an account?
                    <a th:href="@{/auth/signin}">Sign in here</a>
                </p>
            </form>
        </div>
    </div>
</div>

<script>
    function checkPasswordMatch() {
        const password = document.getElementById('password').value;
        const repeatPassword = document.getElementById('repeatPassword').value;
        const mismatchMsg = document.getElementById('passwordMismatch');
        const submitBtn = document.getElementById('submitBtn');

        if (repeatPassword.length > 0) {
            if (password !== repeatPassword) {
                mismatchMsg.style.display = 'block';
                submitBtn.disabled = true;
                document.getElementById('repeatPassword').classList.add('is-invalid');
            } else {
                mismatchMsg.style.display = 'none';
                submitBtn.disabled = false;
                document.getElementById('repeatPassword').classList.remove('is-invalid');
            }
        } else {
            mismatchMsg.style.display = 'none';
            document.getElementById('repeatPassword').classList.remove('is-invalid');
        }
    }
</script>

</body>
</html>
