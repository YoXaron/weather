databaseChangeLog:
  - changeSet:
      id: 3-create-sessions
      author: yoxaron
      changes:
        - createTable:
            tableName: sessions
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: sessions
            baseColumnNames: user_id
            constraintName: fk_sessions_users
            referencedTableName: users
            referencedColumnNames: id
            onDelete: CASCADE
        - createIndex:
            indexName: idx_sessions_user_id
            tableName: sessions
            columns:
              - column:
                  name: user_id
        - createIndex:
            indexName: idx_sessions_expires_at
            tableName: sessions
            columns:
              - column:
                  name: expires_at